# German Visa & Chancenkarte Document Sources
# Restructured: seed domains + discovery rules + optional extra URLs

# ============================================
# Domain crawl configurations
# ============================================
# Each domain defines seed paths and discovery rules.
# The crawler will automatically discover and crawl all relevant pages.

domains:
  - domain: "make-it-in-germany.com"
    seed_paths:
      - "/en/visa-residence/"
      - "/en/visa-residence/opportunity-card"
      - "/en/visa-residence/types/"
      - "/en/visa-residence/procedure/"
      - "/en/visa-residence/skilled-immigration-act"
      - "/en/working-in-germany/"
    authority_level: "official"
    default_visa_types:
      - "general"
    max_depth: 3
    max_pages: 200
    use_sitemap: true

  - domain: "chancenkarte.com"
    seed_paths:
      - "/en/"
      - "/en/guides/"
      - "/en/news/"
      - "/en/calculator/"
    authority_level: "semi_official"
    default_visa_types:
      - "chancenkarte"
    max_depth: 2
    max_pages: 100
    use_sitemap: true

  - domain: "www.germany-visa.org"
    seed_paths:
      - "/"
      - "/work-employment-visa/"
    authority_level: "third_party"
    default_visa_types:
      - "general"
    max_depth: 2
    max_pages: 50
    use_sitemap: true

# ============================================
# Extra URLs (manual additions / special pages)
# ============================================
# These are crawled directly, regardless of domain discovery rules.
# Useful for one-off pages from domains without a full strategy.

extra_urls:
  - url: "https://www.make-it-in-germany.com/en/visa-residence/opportunity-card"
    title: "Opportunity Card (Chancenkarte) - Official Portal"
    authority_level: "official"
    visa_types:
      - "chancenkarte"

  - url: "https://www.make-it-in-germany.com/en/visa-residence/opportunity-card/questions-answers"
    title: "Chancenkarte FAQ - Official"
    authority_level: "official"
    visa_types:
      - "chancenkarte"

  - url: "https://www.make-it-in-germany.com/en/visa-residence/types/eu-blue-card"
    title: "EU Blue Card Germany"
    authority_level: "official"
    visa_types:
      - "blue_card"

  - url: "https://www.make-it-in-germany.com/en/visa-residence/types/it-professionals"
    title: "Visa for IT Professionals"
    authority_level: "official"
    visa_types:
      - "work_visa"
      - "it_visa"

# ============================================
# Crawler settings
# ============================================
update_interval: 24

crawler:
  rate_limit_requests_per_second: 2
  timeout_seconds: 30
  max_retries: 3
  respect_robots_txt: true
  discovery_enabled: true

# Chunking settings
chunking:
  child_chunk_size: 512
  parent_chunk_size: 2048
